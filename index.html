<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Mentor | Age calculator app</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css" integrity="sha512-NmLkDIU1C/C88wi324HBc+S2kLhi08PN5GDeUVVVC/BVt/9Izdsc9SVeVfA1UZbY3sHUlDSyRXhCzHfr6hmPPw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
    <section class="component">

        <div class="content">

            <form class="data_input">
                <fieldset class="fields">
                    <label for="inDay" class="tag_input">DAY</label>
                    <input id="inDay" name="day" type="text" class="field">
                    <span class="message_error">This field is required</span>
                </fieldset>
                <fieldset class="fields">
                    <label for="inMonth" class="tag_input">MONTH</label>
                    <input id="inMonth" name="month" type="text" class="field">
                    <span class="message_error">This field is required</span>
                </fieldset>
                <fieldset class="fields">
                    <label for="inYear" class="tag_input">YEAR</label>
                    <input id="inYear" name="year" type="text" class="field">
                    <span class="message_error">This field is required</span>
                </fieldset>
            </form>
        
            <hr/>
    
            <div class="result">
                <p class="result_title"><span id="outYear">--</span> years</p>
                <p class="result_title"><span id="outMonth">--</span> months</p>
                <p class="result_title"><span id="outDay">--</span> days</p>
            </div>

        </div>

    </section>
    <script src="./js/main.js"></script>
</body>
</html>
